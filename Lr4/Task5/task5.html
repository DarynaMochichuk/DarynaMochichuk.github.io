<!DOCTYPE html>

    <title>Шахова дошка</title>
    <style>
        table {
            border-collapse: collapse;
            border: 2px solid #333;
            margin: 20px auto;
            font-size: 40px;
            text-align: center;
        }

        td {
            width: 60px;
            height: 60px;
            padding: 0;
        }


        tr:nth-child(odd) td:nth-child(even) {
            background-color: #cccccc;
        }

        tr:nth-child(even) td:nth-child(odd) {
            background-color: #cccccc;
        }

        td {
            line-height: 1;
            vertical-align: middle;
        }
    </style>
</head>
